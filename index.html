<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Griyo Dahar - Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f4f8;
            color: #2c3e50;
        }
        header {
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: white;
            text-align: center;
            padding: 60px 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }
        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://via.placeholder.com/1920x300?text=Griyo+Dahar+Background') no-repeat center/cover;
            opacity: 0.2;
            z-index: 0;
        }
        header h1 {
            font-size: 3em;
            margin: 0;
            position: relative;
            z-index: 1;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        header p {
            font-size: 1.2em;
            margin: 10px 0 0;
            position: relative;
            z-index: 1;
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 30px;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        #search {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            box-sizing: border-box;
        }
        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }
        .tab-button {
            background-color: transparent;
            border: none;
            padding: 15px 30px;
            margin: 0 10px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            color: #7f8c8d;
            position: relative;
            transition: color 0.3s ease;
        }
        .tab-button::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background-color: #ff7e5f;
            transition: width 0.3s ease;
        }
        .tab-button:hover {
            color: #ff7e5f;
        }
        .tab-button:hover::after {
            width: 100%;
        }
        .tab-button.active {
            color: #ff7e5f;
        }
        .tab-button.active::after {
            width: 100%;
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .menu-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }
        .menu-item {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .menu-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        .menu-item h3 {
            margin: 0 0 10px;
            color: #e74c3c;
            font-size: 1.4em;
        }
        .menu-item p.price {
            margin: 0 0 10px;
            font-size: 1.3em;
            color: #27ae60;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <header>
        <h1>Griyo Dahar</h1>
        <p>Menu Makanan, Minuman, dan Cemilan Terbaik dengan Sentuhan Modern!</p>
    </header>
    <div class="container">
        <input type="text" id="search" placeholder="Cari menu...">
        <div class="tabs">
            <button class="tab-button active" onclick="openTab('makanan')">Makanan</button>
            <button class="tab-button" onclick="openTab('minuman')">Minuman</button>
            <button class="tab-button" onclick="openTab('cemilan')">Cemilan</button>
        </div>
        <div id="makanan" class="tab-content active">
            <div class="menu-list" id="makanan-list"></div>
        </div>
        <div id="minuman" class="tab-content">
            <div class="menu-list" id="minuman-list"></div>
        </div>
        <div id="cemilan" class="tab-content">
            <div class="menu-list" id="cemilan-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
